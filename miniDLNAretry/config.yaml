name: "miniDLNA for Home Assistant (HA) Retry"
version: 0.1.1a
description: "DEV - Don't use. Goal: This app (~addon) provides you with the latest miniDLNA on Alpine..."
slug: minidlna2
stage: experimental

arch:
  - aarch64
  - amd64

ports:
  "1900/udp": 1900
  8200/tcp: 8200

map:
  - config:rw
  - ssl:rw
  - addons:rw
  - share:rw
  - backup:rw
  - media:rw

host_network: true
homeassistant_api: true
hassio_role: homeassistant

privileged:
  - NET_ADMIN

init: false

startup: services
boot: auto
backup: cold

ingress: false
webui: http://[HOST]:[PORT:8200]
panel_icon: mdi:dlna
panel_title: miniDLNA

options:
  media_dir: /media;/share
  options: -d
  friendly_name: HA miniDLNA
  http_options: 8200

schema:
  media_dir: str
  options: str
  friendly_name: str
  http_options: int
